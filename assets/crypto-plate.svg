  <g transform="translate(400 390)"><path class="paper" d="M25 0 50 17 43 50H7L0 17z"/><text x="25" y="31" text-anchor="middle">S4</text><text class="hash" x="25" y="66" text-anchor="middle">9F02</text><text class="hash" x="25" y="79" text-anchor="middle">B7D3</text></g>
  <g transform="translate(475 390)"><path class="solid" d="M25 0 50 17 43 50H7L0 17z"/><text class="light" x="25" y="31" text-anchor="middle">S5</text><text class="hash" x="25" y="66" text-anchor="middle">3C6A</text><text class="hash" x="25" y="79" text-anchor="middle">F1E0</text></g>
  <path class="guide" d="M100 470v25h260M360 470v25M500 470v25H360M360 495v25" marker-end="url(#arrow)"/>
  <circle class="solid" cx="360" cy="547" r="20"/><text x="395" y="542">RECONSTRUCT SECRET</text><text x="330" y="582">7A2F_4D6C_E91B_8F3A</text>
  <circle class="solid" cx="40" cy="575" r="5"/><text x="55" y="579" class="tiny">SELECTED SHARD</text><circle class="open" cx="40" cy="596" r="5"/><text x="55" y="600" class="tiny">UNSELECTED SHARD</text>
  <g transform="translate(575 22)">
