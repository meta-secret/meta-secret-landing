<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 650" role="img" aria-labelledby="title desc">
  <title id="title">Threshold cryptography, elliptic curve addition, and Merkle proof</title>
  <desc id="desc">Five Shamir shares on a finite-field curve, geometrically correct elliptic curve addition over the real numbers, and a Merkle proof for the third share.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto"><path d="M0 0 8 4 0 8z" fill="#101112"/></marker>
    <style>
      text{fill:#101112;font:12px ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:.04em}.tiny{font-size:9px;fill:#74746f}.small{font-size:10px}.label{font-size:13px;font-weight:700}.axis,.curve,.ecc-curve{fill:none;stroke:#101112;stroke-width:1.4}.guide{fill:none;stroke:#9d9d98;stroke-width:1;stroke-dasharray:5 5}.secant{fill:none;stroke:#74746f;stroke-width:1.15;stroke-dasharray:5 5}.reflection{fill:none;stroke:#244cff;stroke-width:1.15;stroke-dasharray:3 3}.grid{fill:#858681}.selected{fill:#244cff;stroke:#101112;stroke-width:1}.open{fill:#f4f3ef;stroke:#101112;stroke-width:1.4}.solid{fill:#101112}.paper{fill:#f4f3ef;stroke:#101112;stroke-width:1.2}.hash{font-size:9px;fill:#4f504d}.light{fill:#f4f3ef}.box{fill:#f4f3ef;stroke:#101112;stroke-width:1.15}
    </style>
  </defs>
  <text x="30" y="35" class="label">t = 3 / n = 5</text><text x="168" y="35">|</text><text x="190" y="35">GF(p)</text>
  <text x="30" y="58" class="tiny">p = FFFFFFFF00000001000000000000000000000000FFFFFFFFFFFFFFFFFFFFFFFF</text>
  <path class="axis" d="M40 330V90M40 330H520" marker-end="url(#arrow)"/><text x="52" y="104">f(x)</text><text x="530" y="330">x</text>
  <g opacity=".8">
    <circle class="grid" cx="100" cy="130" r="2.3"/><circle class="grid" cx="165" cy="130" r="2.3"/><circle class="grid" cx="230" cy="130" r="2.3"/><circle class="grid" cx="295" cy="130" r="2.3"/><circle class="grid" cx="360" cy="130" r="2.3"/><circle class="grid" cx="425" cy="130" r="2.3"/>
    <circle class="grid" cx="100" cy="175" r="2.3"/><circle class="grid" cx="165" cy="175" r="2.3"/><circle class="grid" cx="230" cy="175" r="2.3"/><circle class="grid" cx="295" cy="175" r="2.3"/><circle class="grid" cx="360" cy="175" r="2.3"/><circle class="grid" cx="425" cy="175" r="2.3"/>
    <circle class="grid" cx="100" cy="220" r="2.3"/><circle class="grid" cx="165" cy="220" r="2.3"/><circle class="grid" cx="230" cy="220" r="2.3"/><circle class="grid" cx="295" cy="220" r="2.3"/><circle class="grid" cx="360" cy="220" r="2.3"/><circle class="grid" cx="425" cy="220" r="2.3"/>
    <circle class="grid" cx="100" cy="265" r="2.3"/><circle class="grid" cx="165" cy="265" r="2.3"/><circle class="grid" cx="230" cy="265" r="2.3"/><circle class="grid" cx="295" cy="265" r="2.3"/><circle class="grid" cx="360" cy="265" r="2.3"/><circle class="grid" cx="425" cy="265" r="2.3"/>
  </g>
  <path class="curve" d="M62 312C108 273 148 270 195 263S272 263 316 244S382 212 424 167S468 121 500 108"/>
  <g><path class="guide" d="M100 281V390M230 258V390M360 224V390M425 166V390M500 111V390"/>
