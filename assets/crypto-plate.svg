  </g>
  <text x="83" y="349">1</text><text x="213" y="349">2</text><text x="343" y="349">3</text><text x="408" y="349">4</text><text x="483" y="349">5</text>
  <g transform="translate(75 390)"><path class="solid" d="M25 0 50 17 43 50H7L0 17z"/><text class="light" x="25" y="31" text-anchor="middle">S1</text><text class="hash" x="25" y="66" text-anchor="middle">A1F2</text><text class="hash" x="25" y="79" text-anchor="middle">9C3B</text></g>
  <g transform="translate(205 390)"><path class="paper" d="M25 0 50 17 43 50H7L0 17z"/><text x="25" y="31" text-anchor="middle">S2</text><text class="hash" x="25" y="66" text-anchor="middle">7B8E</text><text class="hash" x="25" y="79" text-anchor="middle">2D91</text></g>
