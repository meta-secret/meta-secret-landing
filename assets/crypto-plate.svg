    <path class="secant" d="M64 167.2L278 53.1"/>
    <path class="reflection" d="M75 161.3V138.7" marker-end="url(#arrow)"/>
    <circle class="solid" cx="130" cy="132" r="5.5"/><circle class="solid" cx="265" cy="60" r="5.5"/>
    <circle class="open" cx="75" cy="161.3" r="5.5"/><circle class="selected" cx="75" cy="138.7" r="6.5"/>
    <text x="136" y="126" font-style="italic">P</text><text x="270" y="53" font-style="italic">Q</text>
    <text x="45" y="181" font-style="italic">R</text><text x="12" y="126" class="label">P + Q = -R</text>
    <text x="10" y="305" class="tiny">P = (0, 1) / Q = (3, 5) / SECANT</text>
    <text x="10" y="323" class="tiny">THIRD INTERSECTION R = (-11/9, -17/27)</text><text x="10" y="341" class="tiny">REFLECT: P + Q = -R = (-11/9, 17/27)</text>
  </g>
  <g transform="translate(600 390)">
    <text x="0" y="0" class="label">MERKLE PROOF (S3)</text>
    <g transform="translate(0 25)"><rect class="box" width="78" height="31"/><text x="39" y="21" text-anchor="middle">ROOT</text><path class="guide" d="M84 16h75"/><text x="168" y="20" class="small">E3F7_2D9A_5BC1_8F44</text></g>
    <g transform="translate(0 73)"><rect class="box" width="78" height="31"/><text x="39" y="21" text-anchor="middle">H_2</text><path class="guide" d="M84 16h75"/><text x="168" y="20" class="small">D4A8_6C11_9E07_2B5F</text></g>
